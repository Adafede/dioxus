name: Deploy to Codeberg Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: "build and deploy"
    runs-on: codeberg-medium
    env:
      # CI speed-up: keep release mode but avoid ultra-slow workspace release settings
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: https://github.com/Swatinem/rust-cache@v2

      - uses: https://github.com/cargo-bins/cargo-binstall@v1.18.1

      - name: Install dioxus-cli
        run: cargo binstall dioxus-cli --version 0.7.6 --locked

      - name: Verify dx version
        run: dx --version | grep -E "\b0\.7\.6\b"

      - name: Build lotus-explorer
        working-directory: apps/lotus-explorer
        run: dx build --release --platform web --debug-symbols false --base-path "/dioxus/lotus-explorer/"

      - name: Build hello-world
        working-directory: apps/hello-world
        run: dx build --release --platform web --debug-symbols false --base-path "/dioxus/hello-world/"

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r target/dx/lotus-explorer/release/web/public _site/lotus-explorer
          cp -r target/dx/hello-world/release/web/public    _site/hello-world

          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>dioxus-apps</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 0 1rem; }
              h1 { font-size: 1.5rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a { color: #58a6ff; text-decoration: none; font-size: 1.1rem; }
              a:hover { text-decoration: underline; }
              p.desc { color: #8b949e; font-size: 0.9rem; margin: 0.2rem 0 0 0; }
            </style>
          </head>
          <body>
            <h1>🦀 dioxus-apps</h1>
            <ul>
              <li>
                <a href="./lotus-explorer/">🪷 LOTUS Wikidata Explorer</a>
                <p class="desc">Natural product compound × taxon × reference browser</p>
              </li>
              <li>
                <a href="./hello-world/">👋 Hello World</a>
                <p class="desc">Minimal template for new apps</p>
              </li>
            </ul>
          </body>
          </html>
          EOF

      - uses: actions/git-pages@v2
        with:
          site: https://adafede.codeberg.page/dioxus/
          token: ${{ forge.token }}
          source: _site/