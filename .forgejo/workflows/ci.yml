name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native workspace checks
    runs-on: codeberg-medium
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable

      - name: Cache
        uses: https://github.com/Swatinem/rust-cache@v2

      - name: Check workspace (all targets)
        run: cargo check --workspace --all-targets --locked

      - name: Test workspace (all targets)
        run: cargo test --workspace --all-targets --locked --quiet

      - name: Build docs
        run: cargo doc --workspace --no-deps --locked

  wasm:
    name: Type-check explorer (wasm32)
    runs-on: codeberg-small
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: https://github.com/Swatinem/rust-cache@v2

      - name: Check lotus-explorer for wasm32
        run: cargo check -p lotus-explorer --target wasm32-unknown-unknown --locked

  clippy:
    name: Clippy
    runs-on: codeberg-small
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: https://github.com/Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: codeberg-small
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  supply-chain:
    name: Supply-chain checks
    runs-on: codeberg-small
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.4 --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.0 --locked
      - name: Show supply-chain tool versions
        run: |
          cargo deny --version
          cargo audit --version
      - name: Cargo deny
        run: cargo deny check advisories bans licenses sources
      - name: Cargo audit
        run: cargo audit

