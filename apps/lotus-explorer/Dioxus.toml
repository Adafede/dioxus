[application]
name = "lotus-explorer"
default_platform = "web"
asset_dir = "public"
# Note: dx ≥ 0.7 writes the web bundle to
#   target/dx/<package-name>/release/web/public/
# and ignores any `out_dir` key set here.

[web.app]
title = "LOTUS Linked Open Data Explorer"
# Set base_path when serving under a subpath, e.g.:
# base_path = "/lotus-explorer"

[web.watcher]
reload_html = true
watch_path = ["src", "public", "../../crates/shared/src"]

[[web.proxy]]
# Proxy API requests to the lotus-api backend to avoid CORS issues in development
path = "/v1"
backend = "http://127.0.0.1:8787/v1"

