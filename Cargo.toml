[workspace]
resolver = "2"
members = [
  "apps/hello-world",
  "apps/lotus-api",
  "apps/lotus-explorer",
  "crates/shared",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
repository = "https://github.com/adafede/dioxus"
license = "AGPL-3.0-only"

# ── Shared dependency versions ────────────────────────────────────────────────
[workspace.dependencies]
bytes = "1"
console_log = "1.0"
csv = "1"
dioxus = { version = "=0.7.9", features = ["web"] }
js-sys = "0.3"
log = "0.4"
reqwest = { version = "0.13", features = ["gzip"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
tokio = "1.52.2"
urlencoding = "2"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Window"] }

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "warn"
unimplemented = "warn"
use_self = "warn"
unnecessary_wraps = "warn"

[workspace.lints.rust]
unsafe_code = "forbid"
unused_must_use = "deny"
missing_debug_implementations = "warn"

[profile.dev]
opt-level = 1

# ── Release profile — tiny WASM ───────────────────────────────────────────────
[profile.release]
opt-level = "z"
debug = false
strip = "symbols"
lto = "fat"
panic = "abort"
codegen-units = 1

# ── Benchmarking profile — optimized but with symbols for profiling ─────────
[profile.bench]
inherits = "release"
debug = true
strip = "none"
codegen-units = 16

# ── Testing profile — faster compilation, better diagnostics ─────────────────
[profile.test]
opt-level = 1
lto = "thin"

