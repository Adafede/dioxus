[workspace]
resolver = "2"
members = [
  "apps/hello-world",
  "apps/lotus-api",
  "apps/lotus-explorer",
  "crates/shared",
  # Add future apps here — one line per app
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
repository = "https://github.com/adafede/dioxus"
license = "AGPL-3.0-only"

# ── Shared dependency versions ────────────────────────────────────────────────
[workspace.dependencies]
console_log = "1.0"
csv = "1"
# Keep patch-level versions aligned with the pinned `dioxus-cli` in
# `.github/workflows/deploy.yml`.
dioxus = { version = "=0.7.7", features = ["web"] }
js-sys = "0.3"
log = "0.4"
reqwest = { version = "0.13", features = ["gzip"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = "1.52.2"
urlencoding = "2"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Window"] }

[workspace.lints.clippy]
dbg_macro = "deny"

[workspace.lints.rust]
unsafe_code = "forbid"
unused_must_use = "deny"

[profile.dev]
opt-level = 1

# ── Release profile — tiny WASM ───────────────────────────────────────────────
[profile.release]
opt-level = "z"
debug = false
strip = "symbols"
lto = "fat"
panic = "abort"
codegen-units = 1
