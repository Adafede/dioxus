[graph]
all-features = true

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────────────
# All project crates are AGPL-3.0-only. Dependencies must carry a license
# compatible with the GNU Affero General Public License v3 or later.
[licenses]
confidence-threshold = 0.8
allow = [
  # Permissive — fully compatible with AGPL-3.0
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",
]

[licenses.private]
# All workspace crates are unpublished first-party applications/libraries
# (`publish = false`) and use AGPL-3.0-only intentionally. Keep third-party
# dependency licensing strict while excluding these private crates from the
# dependency-license gate.
ignore = true

# ── Dependency bans ───────────────────────────────────────────────────────────
[bans]
# Deny wildcard version requirements — they are unpinnable and unsafe.
wildcards = "deny"
# Highlight all transitive duplication in output.
highlight = "all"

# Duplicates: deny by default; carve out intentional exceptions below.
multiple-versions = "deny"

# Only allow the duplicate crates that are actually present in the current
# dependency graph. Re-audit this list whenever Cargo.lock changes.
skip = [
  { name = "block-buffer" },
  { name = "const-serialize" },
  { name = "const-serialize-macro" },
  { name = "core-foundation" },
  { name = "cpufeatures" },
  { name = "crypto-common" },
  { name = "digest" },
  { name = "getrandom" },
  { name = "jni" },
  { name = "jni-sys" },
  { name = "r-efi" },
  { name = "rustc-hash" },
  { name = "sha2" },
  { name = "thiserror" },
  { name = "thiserror-impl" },
  { name = "windows-sys" },
  { name = "winnow" },
  { name = "wit-bindgen" },
]

# ── Source policy ─────────────────────────────────────────────────────────────
# Only allow crates from crates.io. Deny all unknown registries and git deps.
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
