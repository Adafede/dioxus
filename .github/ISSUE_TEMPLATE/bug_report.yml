name: Bug Report
description: Report a reproducible defect
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to file a bug report.
        Please fill in as much detail as possible so we can reproduce the issue.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - lotus-explorer (frontend / WASM)
        - lotus-api (backend / Axum)
        - shared (SPARQL client / CSV parser)
        - CI / build pipeline
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14.x / Ubuntu 24.04 / ...
        - Rust: 1.95.0
        - dioxus-cli: 0.7.6
        - Browser (if frontend): Firefox 126 / Chrome 125
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am not reporting a security vulnerability (see `SECURITY.md`).
          required: true

