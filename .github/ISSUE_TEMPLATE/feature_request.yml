name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion. Please provide enough context for
        maintainers to evaluate feasibility and priority.

  - type: dropdown
    id: component
    attributes:
      label: Target component
      options:
        - lotus-explorer (frontend / WASM)
        - lotus-api (backend / Axum)
        - shared (SPARQL client / CSV parser)
        - CI / build pipeline
        - Documentation
        - New app / crate
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the problem or limitation you are running into.
        Example: "I need to export results in Parquet format but …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered and why you ruled them out.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or anything else that helps illustrate the request.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am willing to contribute a pull request for this feature.
          required: false

