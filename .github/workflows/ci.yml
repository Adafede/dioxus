name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014  # v2.7.5

      - name: Check workspace (all targets)
        run: cargo check --workspace --all-targets --locked

      - name: Test workspace (all targets)
        run: cargo test --workspace --all-targets --locked --quiet

      - name: Build docs
        run: cargo doc --workspace --no-deps --locked

  wasm:
    name: Type-check explorer (wasm32)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014  # v2.7.5

      - name: Check lotus-explorer for wasm32
        run: cargo check -p lotus-explorer --target wasm32-unknown-unknown --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@5cb072d7354962be830356aa6b146f7612846014  # v2.7.5
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  supply-chain:
    name: Supply-chain checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny and cargo-audit
        uses: taiki-e/install-action@a7adeb15af2926b0ac7478ad165047cd2d8ba350  # v2.47.18
        with:
          tool: cargo-deny,cargo-audit
      - name: Cargo deny
        run: cargo deny check advisories bans licenses sources
      - name: Cargo audit
        run: cargo audit
