name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native:
    name: Native checks + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check lotus-api
        run: cargo check -p lotus-api

      - name: Test lotus-api
        run: cargo test -p lotus-api --quiet

      - name: Check lotus-explorer
        run: cargo check -p lotus-explorer

      - name: Test lotus-explorer
        run: cargo test -p lotus-explorer --quiet

  wasm:
    name: Type-check explorer (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check lotus-explorer for wasm32
        run: cargo check -p lotus-explorer --target wasm32-unknown-unknown

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
