name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Native workspace checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check workspace (all targets)
        run: cargo check --workspace --all-targets --locked

      - name: Test workspace (all targets)
        run: cargo test --workspace --all-targets --locked --quiet

      - name: Build docs
        run: cargo doc --workspace --no-deps --locked

  wasm:
    name: Type-check explorer (wasm32)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check lotus-explorer for wasm32
        run: cargo check -p lotus-explorer --target wasm32-unknown-unknown --locked

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  supply-chain:
    name: Supply-chain checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny and cargo-audit
        uses: taiki-e/install-action@v2.79.2
        with:
          # Pin tool versions for reproducible parser behavior in advisory DB checks.
          tool: cargo-deny@0.19.4,cargo-audit@0.22.1
      - name: Show supply-chain tool versions
        run: |
          cargo deny --version
          cargo audit --version
      - name: Cargo deny
        run: cargo deny check advisories bans licenses sources
      - name: Cargo audit
        run: cargo audit
