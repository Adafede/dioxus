name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["rust"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3e6af16ff035267728e2ebc35df5d4c4cf249f81  # v3.30.3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@3e6af16ff035267728e2ebc35df5d4c4cf249f81  # v3.30.3

      - name: Analyze
        uses: github/codeql-action/analyze@3e6af16ff035267728e2ebc35df5d4c4cf249f81  # v3.30.3

